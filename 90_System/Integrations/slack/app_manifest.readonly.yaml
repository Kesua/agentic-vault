display_information:
  name: Vault Slack Read
features:
  bot_user:
    display_name: Vault Slack Read
    always_online: false
oauth_config:
  scopes:
    bot:
      - channels:history
      - channels:read
      - groups:history
      - groups:read
      - im:history
      - im:read
      - mpim:history
      - mpim:read
      - users:read
      - users:read.email
      - chat:write
      - chat:write.public
      - im:write
      - mpim:write
      - users:read
settings:
  interactivity:
    is_enabled: false
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: true
